<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WashCoARES Net Control</title>
    <style>
      /* Slice 1 visual baseline. WCAG-AA contrast; 48px tap targets. */
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        font-size: 18px;
        color: #111;
        background: #fff;
      }
      main {
        max-width: 480px;
        margin: 0 auto;
        padding: 16px;
      }
      section { display: none; }
      section.active { display: block; }
      h1 { font-size: 22px; margin: 0 0 12px; }
      h2 { font-size: 18px; margin: 0 0 8px; color: #333; }
      label {
        display: block;
        margin-top: 12px;
        font-weight: 600;
      }
      input, textarea, button {
        font-size: 18px;
        font-family: inherit;
        width: 100%;
        min-height: 48px;
        padding: 8px 12px;
        margin-top: 4px;
        border: 1px solid #999;
        border-radius: 6px;
      }
      textarea { min-height: 96px; resize: vertical; }
      button {
        background: #0b69d3;
        color: #fff;
        border: none;
        font-weight: 600;
        cursor: pointer;
        margin-top: 16px;
      }
      button.secondary { background: #777; }
      button:disabled { background: #aaa; cursor: not-allowed; }
      input:focus, textarea:focus, button:focus {
        outline: 3px solid #ffbf47;
        outline-offset: 2px;
      }
      .field-error {
        color: #b00020;
        font-size: 15px;
        margin: 4px 0 0;
        min-height: 18px;
      }
      .row-controls {
        display: flex;
        gap: 8px;
      }
      .row-controls input { flex: 1; }
      .row-controls button { width: auto; min-width: 96px; margin-top: 4px; }
      .header-strip {
        background: #f4f6f8;
        padding: 12px;
        border-radius: 6px;
        margin-bottom: 12px;
      }
      .counters { color: #555; font-size: 16px; }
      .checkin-list {
        list-style: none;
        padding: 0;
        margin: 12px 0;
      }
      .checkin-list li {
        padding: 12px;
        border-bottom: 1px solid #eee;
        font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
        display: flex;
        justify-content: space-between;
      }
      .checkin-list li.flash { animation: flash 0.6s; }
      @keyframes flash {
        from { background: #fff5cc; }
        to { background: transparent; }
      }
      /* Slice 2: Suffix-Tap candidate list */
      .candidates-row {
        margin: 12px 0;
        padding: 12px;
        background: #f4f6f8;
        border-radius: 6px;
      }
      .candidates-list {
        list-style: none;
        padding: 0;
        margin: 8px 0;
      }
      .candidates-list li { margin: 6px 0; }
      .candidate {
        display: block;
        width: 100%;
        min-height: 48px;
        text-align: left;
        font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
        font-size: 18px;
        padding: 12px;
      }
      .candidate:focus { outline: 3px solid #0b69d3; outline-offset: 2px; }
      .recent-badge {
        display: inline-block;
        margin-left: 8px;
        padding: 2px 8px;
        font-size: 14px;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #ffd966;
        color: #111;
        border-radius: 10px;
        font-weight: 600;
      }
      .toast {
        position: fixed;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        background: #222;
        color: #fff;
        padding: 12px 16px;
        border-radius: 6px;
        max-width: 90%;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      }
      .small { font-size: 15px; color: #555; }
    </style>
  </head>
  <body>
    <main>
      <!-- Screen 1: Start -->
      <section id="screen-start" class="active" aria-labelledby="start-title">
        <h1 id="start-title">WashCoARES Net Control</h1>
        <h2>Start a new net</h2>

        <label for="f-date">Net date</label>
        <input id="f-date" type="date" required />
        <p id="e-date" class="field-error" role="alert"></p>

        <label for="f-time">Net time</label>
        <input id="f-time" type="time" required />
        <p id="e-time" class="field-error" role="alert"></p>

        <label for="f-net-type">Net type</label>
        <input id="f-net-type" type="text" maxlength="100" required />
        <p id="e-net-type" class="field-error" role="alert"></p>

        <label for="f-nco">NCO callsign</label>
        <input id="f-nco" type="text" maxlength="18" autocapitalize="characters" autocomplete="off" required />
        <p id="e-nco" class="field-error" role="alert"></p>

        <label for="f-repeater">Repeater (optional)</label>
        <input id="f-repeater" type="text" maxlength="100" />

        <label for="f-notes">Purpose / notes (optional)</label>
        <textarea id="f-notes" maxlength="500"></textarea>

        <button id="btn-start" type="button">Start Net</button>
      </section>

      <!-- Screen 2: Logging -->
      <section id="screen-log" aria-labelledby="log-title">
        <div class="header-strip">
          <h1 id="log-title"><span id="hdr-nco"></span> &middot; <span id="hdr-type"></span> &middot; <span id="hdr-time"></span></h1>
          <p class="counters"><span id="cnt-total">0</span> check-ins &middot; <span id="cnt-unique">0</span> unique</p>
        </div>

        <label for="f-callsign">Callsign</label>
        <div class="row-controls">
          <input id="f-callsign" type="text" maxlength="18" autocapitalize="characters" autocomplete="off" />
          <button id="btn-log" type="button">LOG</button>
        </div>
        <p id="e-callsign" class="field-error" role="alert"></p>

        <!-- Slice 2: Suffix-Tap candidate list. Hidden until onLog suffix-only
             branch renders matches; dismissed via Escape or btn-candidates-cancel. -->
        <div id="candidates-row" class="candidates-row" hidden>
          <p id="candidates-prompt" aria-live="polite">Suffix matches:</p>
          <ul id="candidates-list" class="candidates-list"></ul>
          <button id="btn-candidates-cancel" class="secondary" type="button">Cancel — keep typing</button>
        </div>

        <h2>Last check-ins</h2>
        <ul id="checkin-list" class="checkin-list" aria-live="polite"></ul>

        <button id="btn-end" class="secondary" type="button">End Net</button>
      </section>

      <!-- Screen 3: End confirm + summary -->
      <section id="screen-end" aria-labelledby="end-title">
        <h1 id="end-title">End net?</h1>
        <p><span id="end-type"></span> &middot; <span id="end-time"></span></p>
        <p class="counters">Total check-ins: <span id="end-total">0</span></p>
        <p class="counters">Unique callsigns: <span id="end-unique">0</span></p>

        <button id="btn-end-confirm" type="button">Confirm End</button>
        <button id="btn-end-cancel" class="secondary" type="button">Cancel</button>
      </section>

      <section id="screen-summary" aria-labelledby="summary-title">
        <h1 id="summary-title">Net ended</h1>
        <p><span id="sum-total">0</span> check-ins logged.</p>
        <p><span id="sum-unique">0</span> unique callsigns.</p>
        <p><span id="sum-hours">0</span> hours total (flat 0.5/callsign).</p>

        <a id="btn-open-sheet" href="#" target="_blank" rel="noopener"><button type="button">Open Sheet</button></a>
        <button id="btn-new-net" class="secondary" type="button">Start new net</button>
      </section>
    </main>

    <div id="toast" class="toast" role="alert" hidden></div>

    <script>
      // -----------------------------------------------------------------
      // uuid4 polyfill (handles older browsers without crypto.randomUUID).
      // -----------------------------------------------------------------
      function uuid4() {
        if (typeof crypto !== 'undefined') {
          if (typeof crypto.randomUUID === 'function') {
            return crypto.randomUUID();
          }
          if (typeof crypto.getRandomValues === 'function') {
            var b = crypto.getRandomValues(new Uint8Array(16));
            b[6] = (b[6] & 0x0f) | 0x40;
            b[8] = (b[8] & 0x3f) | 0x80;
            var h = [];
            for (var i = 0; i < 16; i++) h.push(b[i].toString(16).padStart(2, '0'));
            return h.slice(0, 4).join('') + '-' + h.slice(4, 6).join('') + '-' +
                   h.slice(6, 8).join('') + '-' + h.slice(8, 10).join('') + '-' +
                   h.slice(10, 16).join('');
          }
        }
        // Last-resort non-cryptographic fallback for ancient browsers with no crypto at all.
        if (typeof console !== 'undefined' && console.warn) {
          console.warn('uuid4: crypto unavailable; using Math.random (NOT cryptographically secure)');
        }
        var rh = function (n) {
          var s = '';
          for (var i = 0; i < n; i++) s += Math.floor(Math.random() * 16).toString(16);
          return s;
        };
        return rh(8) + '-' + rh(4) + '-4' + rh(3) + '-' +
               (8 + Math.floor(Math.random() * 4)).toString(16) + rh(3) + '-' + rh(12);
      }

      // -----------------------------------------------------------------
      // Client-side validators (mirror server regexes in src/server/validators.ts).
      // CALLSIGN_RE: full FCC callsign — optional DX prefix + base + optional /SUFFIX.
      // SUFFIX_ONLY_RE: bare 1-3 letter suffix, no digit (e.g. "ABC"). Lets the
      // client surface a targeted "type the full callsign" message until Suffix-Tap
      // ships; the predicate also becomes the entry condition for that flow later.
      // -----------------------------------------------------------------
      var CALLSIGN_RE = /^(?:[A-Z]{1,3}[0-9][A-Z]{0,2}\/)?[A-Z]{1,2}[0-9][A-Z]{1,3}(?:\/[A-Z0-9]{1,5})?$/;
      var SUFFIX_ONLY_RE = /^[A-Z]{1,3}$/;
      var DATE_RE = /^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12]\d|3[01])$/;
      var TIME_RE = /^([01]\d|2[0-3]):[0-5]\d$/;

      // Slice 2 — Suffix-Tap inline error messages.
      var LOADING_ROSTER_MSG = 'Loading roster — try again in a moment.';
      var ROSTER_UNAVAILABLE_MSG = 'Roster unavailable — type the full callsign (e.g. W7ABC).';
      var ROSTER_EMPTY_MSG = 'Roster is empty — type the full callsign.';
      var MAX_CANDIDATES = 10;
      function validCallsign(s) { return typeof s === 'string' && s.length <= 18 && CALLSIGN_RE.test(s); }
      function isLikelySuffixOnly(s) { return typeof s === 'string' && SUFFIX_ONLY_RE.test(s); }
      function validDate(s) { return typeof s === 'string' && DATE_RE.test(s); }
      function validTime(s) { return typeof s === 'string' && TIME_RE.test(s); }

      // -----------------------------------------------------------------
      // In-memory client state. Wiped on refresh — Slice 1 accepts this.
      // -----------------------------------------------------------------
      var NetControl = {
        sessionId: null,
        netType: '', ncoCallsign: '', netTime: '',
        checkins: new Map(),  // callsign -> { checkinId, firstTimestamp, latestTimestamp, tapCount }
        history: [],          // ordered list of callsigns in event order (newest first)
        inFlightStart: null,  // { requestId, input }
        inFlightCheckin: null,// { eventId, callsign }
        roster: [],           // RosterEntry[] populated by getRosterSnapshot after startSession
        rosterLoaded: false,  // true once getRosterSnapshot has returned (even if it returned []) — disambiguates "still loading" from "loaded and empty"
        rosterLoadError: false,
      };

      // -----------------------------------------------------------------
      // UI helpers.
      // -----------------------------------------------------------------
      function $(id) { return document.getElementById(id); }
      function showScreen(id) {
        ['screen-start','screen-log','screen-end','screen-summary'].forEach(function (sid) {
          $(sid).classList.toggle('active', sid === id);
        });
      }
      function toast(message) {
        var t = $('toast');
        t.textContent = message;
        t.hidden = false;
        setTimeout(function () { t.hidden = true; }, 3000);
      }
      function setFieldError(errId, text) {
        $(errId).textContent = text || '';
      }
      function clearAllStartErrors() {
        ['e-date','e-time','e-net-type','e-nco'].forEach(function (id) { $(id).textContent = ''; });
      }

      function renderHeader() {
        $('hdr-nco').textContent = NetControl.ncoCallsign;
        $('hdr-type').textContent = NetControl.netType;
        $('hdr-time').textContent = NetControl.netTime;
        $('end-type').textContent = NetControl.netType;
        $('end-time').textContent = NetControl.netTime;
      }
      function renderCounters() {
        var total = 0;
        NetControl.checkins.forEach(function (v) { total += v.tapCount; });
        $('cnt-total').textContent = total;
        $('cnt-unique').textContent = NetControl.checkins.size;
        $('end-total').textContent = total;
        $('end-unique').textContent = NetControl.checkins.size;
      }
      function renderList(flashCallsign) {
        var ul = $('checkin-list');
        ul.textContent = '';
        var shown = NetControl.history.slice(0, 10);
        shown.forEach(function (cs) {
          var entry = NetControl.checkins.get(cs);
          if (!entry) return;
          var li = document.createElement('li');
          if (cs === flashCallsign) li.className = 'flash';
          var left = document.createElement('span');
          left.textContent = cs;
          var right = document.createElement('span');
          right.textContent = '×' + entry.tapCount;
          li.appendChild(left);
          li.appendChild(right);
          ul.appendChild(li);
        });
      }

      // -----------------------------------------------------------------
      // Slice 2 — Suffix-Tap helpers.
      //
      // findCandidatesBySuffix: PRD FR-3 priority order (Slice 2 cut: bands
      // 1 + 2 only). Returns up to MAX_CANDIDATES RosterEntry objects:
      //   Band 1: recent-this-net — iterate NetControl.history (newest-first),
      //           filter to callsigns still in NetControl.checkins, filter by
      //           endsWith(suffix). Name is looked up from NetControl.roster
      //           (if not in roster, name is empty).
      //   Band 2: NetControl.roster entries that endsWith(suffix), excluding
      //           any callsign already in band 1. Declaration order preserved.
      //
      // Caller-contract: `suffix` is 1-3 ALL-CAPS letters (caller already
      // validated via SUFFIX_ONLY_RE). Defensive `if (!suffix) return [];`
      // guards against a future regression in the caller.
      // -----------------------------------------------------------------
      function findCandidatesBySuffix(suffix) {
        if (!suffix) return [];
        var rosterByCallsign = new Map();
        NetControl.roster.forEach(function (e) { rosterByCallsign.set(e.callsign, e); });

        var band1 = [];
        var band1Set = new Set();
        for (var i = 0; i < NetControl.history.length; i++) {
          var cs = NetControl.history[i];
          if (!NetControl.checkins.has(cs)) continue;
          if (!cs.endsWith(suffix)) continue;
          if (band1Set.has(cs)) continue; // defensive against duplicates in history
          var rosterRow = rosterByCallsign.get(cs);
          band1.push({
            callsign: cs,
            name: rosterRow ? rosterRow.name : '',
            lastActive: rosterRow ? rosterRow.lastActive : '',
            recent: true,
          });
          band1Set.add(cs);
          if (band1.length >= MAX_CANDIDATES) break;
        }

        var band2 = [];
        for (var j = 0; j < NetControl.roster.length && band1.length + band2.length < MAX_CANDIDATES; j++) {
          var r = NetControl.roster[j];
          if (band1Set.has(r.callsign)) continue;
          if (!r.callsign.endsWith(suffix)) continue;
          band2.push({
            callsign: r.callsign,
            name: r.name,
            lastActive: r.lastActive,
            recent: false,
          });
        }

        return band1.concat(band2);
      }

      // The stable function reference used by addEventListener / removeEventListener
      // so the listener can actually be removed on dismiss (a fresh closure would
      // not match for removal).
      function onCandidatesKeydown(e) {
        if (e.key !== 'Escape') return;
        if ($('candidates-row').hidden) return; // no-op when list isn't up
        e.preventDefault();
        dismissCandidates();
      }

      function renderCandidates(candidates) {
        var prompt = $('candidates-prompt');
        prompt.textContent = 'Suffix matches: ' + candidates.length + ' found.';
        var ul = $('candidates-list');
        ul.textContent = '';
        candidates.forEach(function (c) {
          var li = document.createElement('li');
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'candidate';
          btn.dataset.callsign = c.callsign;
          // Build textContent: "W7ABC" if name empty, else "W7ABC — Name".
          // No innerHTML — Sheet-controlled name is rendered as text only.
          btn.textContent = c.name ? c.callsign + ' — ' + c.name : c.callsign;
          if (c.recent) {
            var chip = document.createElement('span');
            chip.className = 'recent-badge';
            chip.textContent = 'this net';
            // Space before the chip so screen-reader announces them as separate words.
            btn.appendChild(document.createTextNode(' '));
            btn.appendChild(chip);
          }
          li.appendChild(btn);
          ul.appendChild(li);
        });
        $('candidates-row').hidden = false;
        $('btn-log').disabled = true;
        // Idempotent listener attach: remove first so a future code path that
        // calls renderCandidates twice (without an intervening dismiss) doesn't
        // stack the listener.
        document.removeEventListener('keydown', onCandidatesKeydown);
        document.addEventListener('keydown', onCandidatesKeydown);
        // Focus the first candidate so Enter commits the top one.
        var first = ul.querySelector('button.candidate');
        if (first) first.focus();
      }

      function dismissCandidates() {
        $('candidates-row').hidden = true;
        $('btn-log').disabled = false;
        // Defensive re-enable of any candidate buttons that were disabled
        // by an in-flight onCandidateTap.
        var btns = document.querySelectorAll('#candidates-list .candidate');
        btns.forEach(function (b) { b.disabled = false; });
        // Re-enable the callsign input. onCandidateTap may have disabled it
        // and is still awaiting recordCheckin; the cancel-token trip will
        // also re-enable it later, but doing it here makes the user-perceived
        // cancel latency zero rather than 50ms–2s.
        $('f-callsign').disabled = false;
        NetControl.inFlightCheckin = null;
        document.removeEventListener('keydown', onCandidatesKeydown);
        $('f-callsign').focus();
      }

      // Wipe per-session client state. Called when the server tells us the
      // session is gone (SESSION_NOT_FOUND / SESSION_CLOSED) so the next
      // startSession sees a clean slate rather than inheriting the prior
      // session's checkins, history, and roster snapshot. Does NOT touch
      // start-form values or inFlightStart — that's `onNewNet`'s job.
      function resetSessionLocalState() {
        NetControl.sessionId = null;
        NetControl.checkins = new Map();
        NetControl.history = [];
        NetControl.inFlightCheckin = null;
        NetControl.roster = [];
        NetControl.rosterLoaded = false;
        NetControl.rosterLoadError = false;
        renderCounters();
        renderList(null);
      }

      async function onCandidateTap(callsign) {
        // Capture the eventId locally as a cancel token. If `dismissCandidates`
        // fires while we're awaiting (Escape or Cancel button), the post-await
        // side-effects MUST NOT run — otherwise a cancelled tap still mutates
        // checkins + history + DOM and would stomp the user's input via
        // `$('f-callsign').value = ''`. Server-side, the recordCheckin row may
        // still have been written; that's inherent to in-flight network calls
        // and out of scope here.
        var localEventId = NetControl.inFlightCheckin && NetControl.inFlightCheckin.eventId;
        if (!localEventId) return; // defensive — shouldn't happen via the wired flow

        var btns = document.querySelectorAll('#candidates-list .candidate');
        btns.forEach(function (b) { b.disabled = true; });
        // Also disable the callsign input during the in-flight tap so user
        // typing during the ~2 s BUSY-backoff window can't be wiped by the
        // success path's input-clear.
        $('f-callsign').disabled = true;
        try {
          var result = await callWithRetry('recordCheckin', {
            sessionId: NetControl.sessionId,
            callsign: callsign,
            eventId: localEventId,
          });
          // Gate: was this tap cancelled while we were awaiting?
          if (!NetControl.inFlightCheckin || NetControl.inFlightCheckin.eventId !== localEventId) {
            // Ownership rule: the live owner of #f-callsign's disabled state
            // is whichever flow currently holds NetControl.inFlightCheckin.
            // Since the gate just told us we are NOT that owner, do NOT
            // touch #f-callsign.disabled — a fresh onCandidateTap from a new
            // candidate-list cycle may have intentionally disabled it, and
            // re-enabling here would let the user type during the new tap's
            // BUSY-backoff window and have that typing wiped on its success.
            // The candidate buttons we captured are detached from DOM by the
            // intervening renderCandidates / dismissCandidates, so re-enabling
            // them is a defensive no-op.
            btns.forEach(function (b) { b.disabled = false; });
            return;
          }
          if (!result || !result.ok) {
            if (result && (result.error === 'SESSION_NOT_FOUND' || result.error === 'SESSION_CLOSED')) {
              toast(result.error === 'SESSION_CLOSED' ? 'Net already ended.' : 'Session expired — start a new net.');
              // Tear down candidate-list state so the next session doesn't
              // inherit a stale visible candidate list, a disabled LOG button,
              // a leaked keydown listener, or a stale inFlightCheckin.
              dismissCandidates();
              // Clear per-session client state so the new session starts clean.
              resetSessionLocalState();
              $('f-callsign').disabled = false;
              showScreen('screen-start');
              return;
            } else if (result && result.error === 'INVALID_CALLSIGN') {
              setFieldError('e-callsign', 'Invalid callsign.');
            } else if (result && result.error === 'BUSY_TRY_AGAIN') {
              toast('Try again — system busy.');
            } else {
              toast('Could not log check-in.');
            }
            // Re-enable candidate buttons + input so user can pick again.
            btns.forEach(function (b) { b.disabled = false; });
            $('f-callsign').disabled = false;
            return;
          }
          // Mirror onLog's success-path bookkeeping.
          var existing = NetControl.checkins.get(callsign);
          var entry = existing || { checkinId: result.checkinId, firstTimestamp: '', latestTimestamp: '', tapCount: 0 };
          entry.tapCount = result.tapCount;
          NetControl.checkins.set(callsign, entry);
          NetControl.history = [callsign].concat(NetControl.history.filter(function (c) { return c !== callsign; }));
          NetControl.inFlightCheckin = null;
          renderCounters();
          renderList(result.deduped ? null : callsign);
          // Hide the candidate list, clear the input, restore focus.
          $('candidates-row').hidden = true;
          $('btn-log').disabled = false;
          $('f-callsign').disabled = false;
          document.removeEventListener('keydown', onCandidatesKeydown);
          $('f-callsign').value = '';
          $('f-callsign').focus();
        } catch (e) {
          // Gate: same cancel-token check on the error path. Ownership rule
          // applies — see the success-path gate's comment for the full
          // rationale; do NOT re-enable #f-callsign.disabled when we are not
          // the current owner of inFlightCheckin.
          if (!NetControl.inFlightCheckin || NetControl.inFlightCheckin.eventId !== localEventId) {
            btns.forEach(function (b) { b.disabled = false; });
            return;
          }
          toast('Network error — try again.');
          btns.forEach(function (b) { b.disabled = false; });
          $('f-callsign').disabled = false;
        }
      }

      // -----------------------------------------------------------------
      // Server call helpers (Promise wrappers around google.script.run).
      // -----------------------------------------------------------------
      function callServer(method, payload) {
        return new Promise(function (resolve, reject) {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)[method](payload);
        });
      }
      function sleep(ms) { return new Promise(function (r) { setTimeout(r, ms); }); }

      // Retry an idempotent server call: 1 outer network-error retry, up to 3
      // inner BUSY_TRY_AGAIN retries. Max 4 server calls total per logical action.
      async function callWithRetry(method, payload) {
        var networkRetries = 1;
        while (true) {
          try {
            // Inner loop: handle BUSY_TRY_AGAIN.
            var backoffs = [250, 500, 1000];
            var lastResult = null;
            for (var i = 0; i < backoffs.length + 1; i++) {
              lastResult = await callServer(method, payload);
              if (!(lastResult && lastResult.ok === false && lastResult.error === 'BUSY_TRY_AGAIN')) {
                return lastResult;
              }
              if (i < backoffs.length) await sleep(backoffs[i]);
            }
            return lastResult;
          } catch (err) {
            if (networkRetries > 0) {
              networkRetries -= 1;
              toast('Network error — retrying.');
              await sleep(500);
              continue;
            }
            throw err;
          }
        }
      }

      // -----------------------------------------------------------------
      // Screen 1: Start.
      // -----------------------------------------------------------------
      function todayLocalIso() {
        var d = new Date();
        var pad = function (n) { return String(n).padStart(2, '0'); };
        return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
      }
      function nowLocalHm() {
        var d = new Date();
        var pad = function (n) { return String(n).padStart(2, '0'); };
        return pad(d.getHours()) + ':' + pad(d.getMinutes());
      }
      function initStartDefaults() {
        $('f-date').value = todayLocalIso();
        $('f-time').value = nowLocalHm();
      }

      async function onStart() {
        clearAllStartErrors();
        var input = {
          date: $('f-date').value,
          time: $('f-time').value,
          netType: $('f-net-type').value.trim(),
          ncoCallsign: $('f-nco').value.trim().toUpperCase(),
          repeater: $('f-repeater').value,
          purposeNotes: $('f-notes').value,
        };
        var ok = true;
        if (!validDate(input.date)) { setFieldError('e-date', 'Date must look like 2026-05-12.'); ok = false; }
        if (!validTime(input.time)) { setFieldError('e-time', 'Time must look like 19:00 (24-hour).'); ok = false; }
        if (!input.netType) { setFieldError('e-net-type', 'Net type is required (max 100 chars).'); ok = false; }
        if (!validCallsign(input.ncoCallsign)) { setFieldError('e-nco', 'Callsigns are letters, digits, and / only (e.g. W7ABC).'); ok = false; }
        if (!ok) return;

        // Preserve requestId across retries.
        if (!NetControl.inFlightStart) {
          NetControl.inFlightStart = { requestId: uuid4(), input: input };
        }
        $('btn-start').disabled = true;
        try {
          var result = await callWithRetry('startSession', Object.assign({ requestId: NetControl.inFlightStart.requestId }, input));
          if (!result || !result.ok) {
            if (result && result.error === 'BUSY_TRY_AGAIN') {
              toast('Try again — system busy.');
            } else if (result && result.error === 'INVALID_INPUT') {
              setFieldError('e-' + result.field, result.reason || 'Invalid');
            } else if (result && result.error === 'NOT_CONFIGURED') {
              toast('App not configured — contact trustee.');
            } else {
              toast('Could not start net.');
            }
            return;
          }
          NetControl.sessionId = result.sessionId;
          NetControl.netType = input.netType;
          NetControl.ncoCallsign = input.ncoCallsign;
          NetControl.netTime = input.time;
          NetControl.inFlightStart = null;
          renderHeader();
          renderCounters();
          renderList(null);
          showScreen('screen-log');
          setTimeout(function () { $('f-callsign').focus(); }, 0);

          // Fire-and-forget roster fetch. We don't await — Logging screen
          // appears immediately. Capture sessionId in a closure so a late-
          // resolving snapshot doesn't pollute a subsequent session's state.
          var fetchSessionId = NetControl.sessionId;
          callWithRetry('getRosterSnapshot', {}).then(function (snap) {
            if (NetControl.sessionId !== fetchSessionId) return;
            if (snap && snap.ok) {
              NetControl.roster = snap.roster;
              NetControl.rosterLoaded = true;
              // Late-resolution UX cue: if we're currently showing the
              // "Loading roster" inline error, clear it now.
              if ($('e-callsign').textContent === LOADING_ROSTER_MSG) {
                setFieldError('e-callsign', '');
              }
            } else {
              NetControl.rosterLoadError = true;
            }
          }).catch(function () {
            if (NetControl.sessionId !== fetchSessionId) return;
            NetControl.rosterLoadError = true;
          });
        } catch (e) {
          toast('Network error — try again.');
        } finally {
          $('btn-start').disabled = false;
        }
      }

      // -----------------------------------------------------------------
      // Screen 2: Logging.
      // -----------------------------------------------------------------
      async function onLog() {
        setFieldError('e-callsign', '');
        var raw = $('f-callsign').value.trim().toUpperCase();
        if (!validCallsign(raw)) {
          if (isLikelySuffixOnly(raw)) {
            // Mint the eventId now and stash in inFlightCheckin (callsign null
            // until the NCO picks one); onCandidateTap reuses this eventId so
            // a BUSY-retry doesn't double-log.
            if (!NetControl.inFlightCheckin) {
              NetControl.inFlightCheckin = { eventId: uuid4(), callsign: null };
            }
            if (NetControl.rosterLoadError) {
              setFieldError('e-callsign', ROSTER_UNAVAILABLE_MSG);
              NetControl.inFlightCheckin = null;
              return;
            }
            if (!NetControl.rosterLoaded) {
              // Snapshot hasn't returned yet. Distinct from loaded-but-empty.
              setFieldError('e-callsign', LOADING_ROSTER_MSG);
              NetControl.inFlightCheckin = null;
              return;
            }
            // Run the candidate lookup BEFORE the empty-roster check —
            // band 1 (recent-this-net) doesn't depend on the roster, so a
            // callsign the NCO already logged via direct LOG should still
            // surface as a candidate even when the Roster tab is empty.
            var candidates = findCandidatesBySuffix(raw);
            if (candidates.length > 0) {
              renderCandidates(candidates);
              return;
            }
            // Zero candidates: pick the most informative message based on
            // why nothing matched.
            if (NetControl.roster.length === 0) {
              // Roster is empty AND no recent-this-net match either.
              setFieldError('e-callsign', ROSTER_EMPTY_MSG);
            } else {
              setFieldError(
                'e-callsign',
                "No callsign in the roster ends with '" + raw + "'. Type the full callsign or check the suffix.",
              );
            }
            NetControl.inFlightCheckin = null;
            return;
          } else {
            setFieldError('e-callsign', 'Callsigns are letters, digits, and / only (e.g. W7ABC, K7XYZ/M).');
          }
          return;
        }
        if (!NetControl.inFlightCheckin) {
          NetControl.inFlightCheckin = { eventId: uuid4(), callsign: raw };
        }
        $('btn-log').disabled = true;
        try {
          var result = await callWithRetry('recordCheckin', {
            sessionId: NetControl.sessionId,
            callsign: raw,
            eventId: NetControl.inFlightCheckin.eventId,
          });
          if (!result || !result.ok) {
            if (result && result.error === 'SESSION_NOT_FOUND') {
              toast('Session expired — start a new net.');
              resetSessionLocalState();
              showScreen('screen-start');
            } else if (result && result.error === 'SESSION_CLOSED') {
              toast('Net already ended.');
              resetSessionLocalState();
              showScreen('screen-start');
            } else if (result && result.error === 'INVALID_CALLSIGN') {
              setFieldError('e-callsign', 'Invalid callsign.');
            } else if (result && result.error === 'BUSY_TRY_AGAIN') {
              toast('Try again — system busy.');
            } else {
              toast('Could not log check-in.');
            }
            return;
          }
          // Update client state.
          var existing = NetControl.checkins.get(raw);
          var entry = existing || { checkinId: result.checkinId, firstTimestamp: '', latestTimestamp: '', tapCount: 0 };
          entry.tapCount = result.tapCount;
          NetControl.checkins.set(raw, entry);
          // Move callsign to the top of history.
          NetControl.history = [raw].concat(NetControl.history.filter(function (c) { return c !== raw; }));
          NetControl.inFlightCheckin = null;
          renderCounters();
          renderList(result.deduped ? null : raw);
          $('f-callsign').value = '';
          $('f-callsign').focus();
        } catch (e) {
          toast('Network error — try again.');
        } finally {
          $('btn-log').disabled = false;
        }
      }

      function onEndTap() {
        showScreen('screen-end');
      }
      function onEndCancel() {
        showScreen('screen-log');
        setTimeout(function () { $('f-callsign').focus(); }, 0);
      }
      async function onEndConfirm() {
        $('btn-end-confirm').disabled = true;
        try {
          var result = await callWithRetry('endSession', { sessionId: NetControl.sessionId });
          if (!result || !result.ok) {
            toast('Could not end net.');
            return;
          }
          $('sum-total').textContent = result.checkinCount;
          $('sum-unique').textContent = result.uniqueCallsignCount;
          $('sum-hours').textContent = result.hoursTotal;
          $('btn-open-sheet').href = result.spreadsheetUrl;
          showScreen('screen-summary');
        } catch (e) {
          toast('Network error — try again.');
        } finally {
          $('btn-end-confirm').disabled = false;
        }
      }

      function onNewNet() {
        NetControl = {
          sessionId: null,
          netType: '', ncoCallsign: '', netTime: '',
          checkins: new Map(),
          history: [],
          inFlightStart: null,
          inFlightCheckin: null,
          roster: [],
          rosterLoaded: false,
          rosterLoadError: false,
        };
        ['f-net-type','f-nco','f-repeater','f-notes','f-callsign'].forEach(function (id) {
          var el = $(id); if (el) el.value = '';
        });
        clearAllStartErrors();
        initStartDefaults();
        showScreen('screen-start');
      }

      // -----------------------------------------------------------------
      // Wire up event listeners on DOM ready.
      // -----------------------------------------------------------------
      document.addEventListener('DOMContentLoaded', function () {
        initStartDefaults();
        $('btn-start').addEventListener('click', onStart);
        $('btn-log').addEventListener('click', onLog);
        $('f-callsign').addEventListener('keydown', function (e) {
          if (e.key !== 'Enter') return;
          // Always preventDefault first so a future refactor that wraps this
          // input in a <form> doesn't let Enter trigger implicit form submit
          // even when the candidate list is up.
          e.preventDefault();
          // Gate: Enter must not bypass the disabled LOG button when the
          // candidate list is showing. Cancel/Escape are the only dismissals.
          if (!$('candidates-row').hidden) return;
          onLog();
        });
        $('btn-end').addEventListener('click', onEndTap);
        $('btn-end-cancel').addEventListener('click', onEndCancel);
        $('btn-end-confirm').addEventListener('click', onEndConfirm);
        $('btn-new-net').addEventListener('click', onNewNet);

        // Slice 2 wiring: candidate-list click delegation + cancel button.
        $('candidates-list').addEventListener('click', function (e) {
          var btn = e.target.closest && e.target.closest('button.candidate');
          if (!btn || btn.disabled) return;
          var cs = btn.dataset.callsign;
          if (cs) onCandidateTap(cs);
        });
        $('btn-candidates-cancel').addEventListener('click', dismissCandidates);
      });
    </script>
  </body>
</html>
